spring:
  application:
    name: autoblog
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  error:
    include-message: never
    include-binding-errors: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

autoblog:
  public-base-url:
